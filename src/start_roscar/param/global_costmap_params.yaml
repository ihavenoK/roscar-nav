#代价地图官方介绍：http://wiki.ros.org/costmap_2d

#全局代价地图参数命名空间
global_costmap:
  #代价地图的TF参考坐标系
  global_frame: map 
  #机器人的TF坐标名称
  robot_base_frame: base_footprint
  #global_frame和robot_base_frame间的TF坐标停止发布多久后，控制机器人停止，单位：s
  transform_tolerance: 5.0
  #代价地图刷新频率，单位：Hz (1.5→1.0，省CPU)
  update_frequency: 1.0
  #代价地图的可视化话题发布频率，单位：Hz
  publish_frequency: 1.0

  #是否直接使用静态地图生成代价地图
  #static_map: true #使用plugins手动配置代价地图时，该参数无效
  #代价地图是否跟随机器人移动，static_map为true时该参数必须为false
  rolling_window: false
  #代价地图宽度，这里会被静态层扩宽，单位：m (10→6，省CPU)
  width: 4 
  #代价地图高度，这里会被静态层扩宽，单位：m (10→6)
  height: 4
  #代价地图分辨率（米/单元格）
  resolution: 0.08
  
  #为代价地图设置地图层，这里设置了二层：静态层和膨胀层
  #（已删除 obstacle_layer/VoxelLayer：全局代价地图无传感器数据源，
  #  空壳层会在 recovery 后干扰全局规划，导致 path 消失）
  plugins:
    #定义地图层的名称，设置地图层的类型
    - {name: static_layer,      type: "costmap_2d::StaticLayer"}
    #定义地图层的名称，设置地图层的类型
    - {name: inflation_layer,   type: "costmap_2d::InflationLayer"}
  #各地图层的参数，会以地图层名称作为命名空间
  #各地图层的参数，会在【costmap_common_params.yaml】内进行设置