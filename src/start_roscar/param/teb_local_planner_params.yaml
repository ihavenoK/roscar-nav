#TebLocalPlanner官方介绍：http://wiki.ros.org/teb_local_planner

#局部路径规划器DWAPlannerROS命名空间
TebLocalPlannerROS:
  odom_topic: odom_combined #订阅的里程计话题（与TF树/costmap坐标系一致，避免漂移）
  map_frame: map #代价地图的TF参考坐标系

  #机器人参数
  max_vel_x: 0.20 #（0.30→0.20，降低最高速度，行驶更平稳）
  max_vel_y: 0.0 #最大y前向速度，单位：m/s，非全向移动小车需要设置为0
  max_vel_x_backwards: 0.25 #（0.15→0.25，增强倒车能力，便于旋转调整时快速回退）
  max_vel_theta: 3.0  #最大转向角速度，单位：rad/s（1.5→3.0，提升旋转能力，转弯更快）
  acc_lim_x: 0.5  #最大x向加速度，单位：m/s^2
  acc_lim_y: 0.0  #最大y向加速度，，单位：m/s^2,非全向移动小车需要设置为0
  acc_lim_theta: 1.5  #最大角加速度，单位：rad/s^2（0.8→1.5，旋转更快启停，减少圆滑过渡）

  #阿克曼小车参数，差速小车设为0
  min_turning_radius: 0.0 #机器人最小转弯半径（差速为0，可原地旋转）
  wheelbase: 0.0 #机器人轴距（差速为0）
  cmd_angle_instead_rotvel: False #true则cmd_vel/angular/z内的数据是舵机角度

  #用于局部路径规划的机器人外形
  #机器人外形的类型可以为：point、circular、two_circles、line、polygon，默认为point类型
  footprint_model:    
    #type: point #point类型不需要设置其它参数

    #type: circular #圆形类型，需要设置圆的半径
    #radius: 0.3

    #type: two_circles #两个圆类型，需要设置两个圆的位置和半径
    #front_offset: 0.2 #前面的圆的位置，相对机器人中心
    #front_rasius: 0.2 #前面的圆的半径
    #rear_offset : 0.2 #后面的圆的位置，相对机器人中心
    #rear_rasius : 0.2 #前面的圆的半径

    #type: line #两条线类型，需要设置两条线的位置
    #line_start: [0.00, 0.0]
    #line_end: [0.7, 0.0]
    
    #type: polygon #多边形类型，需要设置各顶点的坐标值
    #vertices: [[-0.133, -0.125],[-0.133, 0.125],[0.133,0.125],[0.133, -0.125]]

    type: polygon
    vertices: [[-0.09, -0.185], [-0.09, 0.185], [0.4,0.185],  [0.4, -0.185]]   #机器人形状 for senior_akm

  #障碍物参数
  min_obstacle_dist: 0.30  #（0.45→0.30，红灯点附近灯杆距离~0.35m，0.45硬约束直接无解）
  include_costmap_obstacles: True #是否将动态障碍物预测为速度模型，
  costmap_obstacles_behind_robot_dist: 1.5 #限制机器人后方规划时考虑的局部成本地图障碍物
  obstacle_poses_affected: 15  #障碍物姿态受影响0~30
  costmap_converter_plugin: ""
  costmap_converter_spin_thread: True
  costmap_converter_rate: 3
  include_dynamic_obstacles: False 
  dynamic_obstacle_inflation_dist: 0.4

  #目标点误差允许值
  xy_goal_tolerance: 0.50  #机器人到达目标点时附近时的偏差允许量，单位：m（30→50cm，减少到点微调）
  yaw_goal_tolerance: 0.3  #机器人到达目标点时附近时的弧度偏差允许量，单位：rad（~17°，保持不变，红绿灯点必须正对灯）
  free_goal_vel: True     #允许机器人以最大速度驶向目的地（进tolerance直接停，不再微调）

  #轨道配置参数
  teb_autosize: True #优化期间允许改变轨迹的时域长度
  dt_ref: 0.5  #轨迹点时间间隔(0.4→0.5，减少优化变量数≈20%，省计算)
  dt_hysteresis: 0.15 #允许改变的时域解析度的浮动范围
  global_plan_overwrite_orientation: False #关闭朝向覆盖，按全局路径本身朝向走，避免S型摆动
  max_global_plan_lookahead_dist: 3.0 #考虑优化的全局计划子集的最大长度(原5→3，减少优化点)
  feasibility_check_no_poses: 4 #检测位姿可到达的时间间隔 minimum 0

  #轨迹优化参数
  # ★ 内层3, 外层3, 共9次求解（2+2不够收敛→目标点附近振荡，回退到3+3）
  no_inner_iterations: 3
  no_outer_iterations: 3
  optimization_activate: True
  optimization_verbose: False
  penalty_epsilon: 0.1
  obstacle_cost_exponent: 2 # 障碍物代价指数(4→2，代价增长更线性，避免近距离被猛烈推开转圈)
  weight_max_vel_x: 2
  weight_max_vel_theta: 0.15  #（0.5→0.15，旋转几乎免费，替代倒车）
  weight_acc_lim_x: 1
  weight_acc_lim_theta: 0.15  #（0.5→0.15，角加速度不收束，转动更灵活）
  weight_kinematics_nh: 1000
  weight_kinematics_forward_drive: 100  #（250→100，进一步降低前进偏好，倒车旋转更自由，路径不刻意圆滑）
  weight_kinematics_turning_radius: 0  #（1→0，彻底移除转弯半径代价，允许轨迹出现直角弯）
  weight_optimaltime: 3 #（5→3，降低时间最优压力，避免优化器把直角弯自动平滑成弧线）
  weight_shortest_path: 0
  # ★ obstacle: 80→60, viapoint: 5→10: 避障后viapoint拉力不够→原地打转，
  #    比例从16:1降到6:1，避障完能拉回全局路径
  weight_obstacle: 60
  weight_inflation: 0.2
  weight_dynamic_obstacle: 10  #动态障碍物额外权重
  weight_dynamic_obstacle_inflation: 0.2
  weight_viapoint: 15  #（25→15，降低全局路径跟随力，允许TEB走出更直接的折线而非圆滑弧线）
  weight_adapt_factor: 2

  #不同拓扑中的并行规划
  enable_homotopy_class_planning: False
  enable_multithreading: True
  max_number_classes: 4
  selection_cost_hysteresis: 1.0
  selection_prefer_initial_plan: 0.95
  selection_obst_cost_scale: 1.0
  selection_alternative_time_cost: False
  roadmap_graph_no_samples: 15
  roadmap_graph_area_width: 5
  roadmap_graph_area_length_scale: 1.0
  h_signature_prescaler: 0.5
  h_signature_threshold: 0.1
  obstacle_heading_threshold: 0.45
  switching_blocking_period: 0.0
  viapoints_all_candidates: True
  delete_detours_backwards: True
  max_ratio_detours_duration_best_duration: 3.0
  visualize_hc_graph: False
  visualize_with_time_as_z_axis_scale: False

  #恢复行为
  shrink_horizon_backup: True
  shrink_horizon_min_duration: 5
  oscillation_recovery: True
  oscillation_v_eps: 0.1
  oscillation_omega_eps: 0.1
  oscillation_recovery_min_duration: 5
  oscillation_filter_duration: 10
